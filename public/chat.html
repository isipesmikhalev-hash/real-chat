<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Chat | Мессенджер</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="messenger">
            <!-- Боковая панель -->
            <div class="sidebar glass">
                <div class="sidebar-header">
                    <h2>💬 Real Chat</h2>
                    <div class="user-info" id="userInfo"></div>
                </div>
                
                <div class="search-section">
                    <input type="text" id="searchUser" placeholder="🔍 Найти пользователя по логину">
                    <button id="searchBtn">Найти</button>
                    <div id="searchResult" class="search-result"></div>
                </div>
                
                <div class="requests-section">
                    <h3>📨 Заявки в друзья</h3>
                    <div id="requestsList" class="requests-list"></div>
                </div>
                
                <div class="friends-section">
                    <h3>👥 Друзья</h3>
                    <div id="friendsList" class="friends-list"></div>
                </div>
            </div>
            
            <!-- Основная область чата -->
            <div class="chat-area glass">
                <div class="chat-header" id="chatHeader">
                    <h3>Выберите друга для начала общения</h3>
                </div>
                
                <div class="messages-area" id="messagesArea">
                    <div class="welcome-message">✨ Выберите друга из списка слева ✨</div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
                    <button id="sendBtn" disabled>📤 Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
